# force re-register schedule
name: Vibexa Chat Push Notification

on:
  schedule:
    # Tiap 5 menit — ini interval MINIMUM yang diizinkan GitHub Actions utk cron.
    # Catatan: GitHub tidak menjamin waktu jalan persis tiap 5 menit, terutama
    # saat beban server GitHub sedang tinggi — bisa molor jadi ~10-15 menit.
    - cron: '*/5 * * * *'
  # Supaya bisa dites/dijalankan manual kapan saja lewat tab "Actions" di GitHub.
  workflow_dispatch: {}

jobs:
  send-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: notify-worker/package-lock.json

      - name: Install dependencies
        working-directory: notify-worker
        run: npm install

      - name: Kirim push notifikasi chat yang tertunda
        working-directory: notify-worker
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
        run: node send-chat-push.js
