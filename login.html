<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibexa — Sign In</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#156dee">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NVM">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080B12;
  --panel: #0E1220;
  --card: #141928;
  --hover: #1A2035;
  --border: rgba(255,255,255,0.07);
  --green: #1D6BDB;
  --green-dim: rgba(29,107,219,0.12);
  --green-glow: 0 0 30px rgba(29,107,219,0.3);
  --teal: #3D9DD6;
  --text: #EEF2FF;
  --sub: #7B8DB0;
  --muted: #3A4560;
  --error: #ff5555;
  --error-dim: rgba(255,85,85,0.1);
  --success: #3dda6e;
  --f: 'Outfit', sans-serif;
  --fm: 'DM Mono', monospace;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }

body {
  font-family: var(--f);
  background: var(--bg);
  color: var(--text);
  display: flex;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
  overflow-y: auto;
}

/* Animated background */
.bg-glow {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}
.bg-glow::before {
  content: '';
  position: absolute;
  width: 600px; height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(29,107,219,0.12) 0%, transparent 70%);
  top: -100px; left: -150px;
  animation: drift1 12s ease-in-out infinite alternate;
}
.bg-glow::after {
  content: '';
  position: absolute;
  width: 500px; height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(61,157,214,0.08) 0%, transparent 70%);
  bottom: -80px; right: -100px;
  animation: drift2 15s ease-in-out infinite alternate;
}
@keyframes drift1 { from { transform: translate(0,0) scale(1); } to { transform: translate(60px, 40px) scale(1.1); } }
@keyframes drift2 { from { transform: translate(0,0) scale(1); } to { transform: translate(-40px, -60px) scale(1.15); } }

/* Floating music notes */
.notes-bg {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.note {
  position: absolute;
  font-size: 1.2rem;
  opacity: 0.06;
  animation: floatNote linear infinite;
  user-select: none;
}
@keyframes floatNote {
  0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
  10% { opacity: 0.06; }
  90% { opacity: 0.06; }
  100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
}

/* Grid pattern overlay */
.grid-overlay {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background-image: 
    linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
  background-size: 50px 50px;
}

/* Main card */
.page-wrap {
  position: relative;
  z-index: 1;
  display: flex;
  width: 100%;
  max-width: 420px;
  padding: 16px;
  margin: auto;
}

.card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 40px 36px 36px;
  width: 100%;
  position: relative;
  overflow: hidden;
  animation: cardIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(24px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--green), var(--teal), transparent);
  opacity: 0.7;
}
.card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 300px 200px at 50% 0%, rgba(29,107,219,0.06), transparent 60%);
  pointer-events: none;
}

/* Logo */
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 32px;
}
.logo-mark {
  width: 38px; height: 38px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  flex-shrink: 0;
}
.logo-mark img { width: 100%; height: 100%; object-fit: cover; }
.logo-name {
  font-size: 1.5rem;
  font-weight: 800;
  letter-spacing: -0.5px;
  background: linear-gradient(130deg, #fff 30%, var(--sub));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* Brand GIF */
.brand-gif {
  display: flex;
  justify-content: center;
  margin: -18px 0 22px;
}
.brand-gif img {
  width: 64px;
  height: 64px;
  object-fit: cover;
  border-radius: 12px;
  border: 1px solid var(--border);
  box-shadow: 0 0 16px rgba(29,107,219,0.25);
}

/* Heading */
.heading { margin-bottom: 28px; }
.heading h1 {
  font-size: 1.55rem;
  font-weight: 800;
  letter-spacing: -0.5px;
  margin-bottom: 6px;
  line-height: 1.2;
}
.heading p {
  font-size: 0.83rem;
  color: var(--sub);
  line-height: 1.6;
}

/* Form */
.form-group {
  margin-bottom: 16px;
  animation: fadeUp 0.4s ease forwards;
  opacity: 0;
}
.form-group:nth-child(1) { animation-delay: 0.1s; }
.form-group:nth-child(2) { animation-delay: 0.18s; }
.form-group:nth-child(3) { animation-delay: 0.24s; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

label {
  display: block;
  font-size: 0.76rem;
  font-weight: 600;
  color: var(--sub);
  margin-bottom: 7px;
  letter-spacing: 0.4px;
  text-transform: uppercase;
}

.input-wrap {
  position: relative;
}
.input-wrap svg {
  position: absolute;
  left: 14px; top: 50%; transform: translateY(-50%);
  width: 16px; height: 16px;
  color: var(--muted);
  pointer-events: none;
  transition: color 0.2s;
}
.input-wrap input {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px 12px 42px;
  color: var(--text);
  font-family: var(--f);
  font-size: 0.88rem;
  outline: none;
  transition: all 0.2s;
}
.input-wrap input::placeholder { color: var(--muted); }
.input-wrap input:focus {
  border-color: var(--green);
  box-shadow: 0 0 0 3px var(--green-dim);
  background: var(--hover);
}
.input-wrap input:focus + svg,
.input-wrap svg:has(+ input:focus) { color: var(--green); }
.input-wrap input:focus ~ svg { color: var(--green); }
.input-wrap:focus-within svg { color: var(--green); }

/* Password toggle */
.pw-toggle {
  position: absolute;
  right: 12px; top: 50%; transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  padding: 4px;
  border-radius: 6px;
  display: flex; align-items: center;
  transition: color 0.2s;
}
.pw-toggle:hover { color: var(--text); }
.pw-toggle svg {
  position: static;
  top: auto; left: auto; right: auto; transform: none;
  color: inherit;
  pointer-events: none;
}

/* Forgot password */
.forgot-wrap {
  display: flex;
  justify-content: flex-end;
  margin-top: 6px;
}
.forgot-link {
  font-size: 0.76rem;
  color: var(--sub);
  text-decoration: none;
  transition: color 0.2s;
  cursor: pointer;
  background: none;
  border: none;
  font-family: var(--f);
}
.forgot-link:hover { color: var(--green); }

/* Error message */
.error-msg {
  display: none;
  background: var(--error-dim);
  border: 1px solid rgba(255,85,85,0.2);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 0.8rem;
  color: var(--error);
  margin-bottom: 16px;
  align-items: center;
  gap: 8px;
}
.error-msg.show { display: flex; animation: shake 0.3s ease; }
@keyframes shake {
  0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)}
}

/* Success message */
.success-msg {
  display: none;
  background: rgba(61,218,110,0.1);
  border: 1px solid rgba(61,218,110,0.2);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 0.8rem;
  color: var(--success);
  margin-bottom: 16px;
  align-items: center;
  gap: 8px;
}
.success-msg.show { display: flex; }

/* Submit button */
.btn-submit {
  width: 100%;
  background: var(--green);
  border: none;
  border-radius: 12px;
  padding: 13px 24px;
  color: #fff;
  font-family: var(--f);
  font-weight: 700;
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.25s;
  margin-top: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  letter-spacing: 0.2px;
  position: relative;
  overflow: hidden;
}
.btn-submit::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
}
.btn-submit:hover:not(:disabled) {
  box-shadow: var(--green-glow);
  transform: translateY(-1px);
}
.btn-submit:active:not(:disabled) { transform: translateY(0); }
.btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

/* Loader spinner */
.spinner {
  width: 40px; height: 30px;
  display: none;
  background: url('bird.gif') center/contain no-repeat;
  filter: drop-shadow(0 0 6px rgba(255,255,255,0.4));
}
.btn-submit.loading .btn-text { display: none; }
.btn-submit.loading .spinner { display: block; }

/* Divider */
.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 20px 0;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}
.divider span {
  font-size: 0.72rem;
  color: var(--muted);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* Google button */
.btn-google {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 24px;
  color: var(--text);
  font-family: var(--f);
  font-weight: 600;
  font-size: 0.87rem;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.btn-google:hover {
  background: var(--hover);
  border-color: rgba(255,255,255,0.12);
  transform: translateY(-1px);
}

/* Footer link */
.footer-link {
  text-align: center;
  margin-top: 24px;
  font-size: 0.82rem;
  color: var(--sub);
}
.footer-link a {
  color: var(--green);
  text-decoration: none;
  font-weight: 600;
  transition: color 0.2s;
}
.footer-link a:hover { color: var(--teal); text-decoration: underline; }

/* Reset password modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(8,11,18,0.92);
  z-index: 100;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 32px 28px;
  max-width: 360px;
  width: 100%;
  position: relative;
  animation: cardIn 0.3s ease forwards;
}
.modal-box h3 { font-size: 1.1rem; font-weight: 800; margin-bottom: 8px; }
.modal-box p { font-size: 0.82rem; color: var(--sub); margin-bottom: 20px; line-height: 1.6; }
.modal-close {
  position: absolute;
  top: 16px; right: 16px;
  background: var(--card);
  border: none;
  border-radius: 8px;
  width: 30px; height: 30px;
  color: var(--sub);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  transition: all 0.2s;
}
.modal-close:hover { color: var(--text); background: var(--hover); }
</style>
</head>

<div class="bg-glow"></div>
<div class="grid-overlay"></div>
<div class="notes-bg" id="notesBg"></div>

<div class="page-wrap">
  <div class="card">

      <div class="logo-mark">

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>

    <div class="form-group">

        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">

    <div class="divider"><span>or</span></div>

    <button class="btn-google" onclick="doGoogleLogin()">

      Sign in with Google
    </button>

    <div class="footer-link">
      Don't have an account? <a href="register.html">Sign up now</a>
    </div>
  </div>
</div>

<!-- Reset Password Modal -->
<div class="modal-overlay" id="resetModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeReset()">✕</button>
    <h3>Reset Password</h3>

    <div id="resetError" class="error-msg" style="margin-bottom:14px">

    <div class="form-group" style="margin-bottom:16px;opacity:1;animation:none">
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>

      <span class="btn-text">Send Reset Link</span>
      <div class="spinner"></div>
    </button>
  </div>
</div>

<script>
// ── Floating notes ────────────────────────────────────────
const NOTES = ['♪','♫','♬','♩','♭','♮'];
const nb = document.getElementById('notesBg');
for (let i = 0; i < 18; i++) {
  const n = document.createElement('div');
  n.className = 'note';
  n.textContent = NOTES[Math.floor(Math.random() * NOTES.length)];
  n.style.left = Math.random() * 100 + '%';
  n.style.fontSize = (0.9 + Math.random() * 1.2) + 'rem';
  n.style.animationDuration = (14 + Math.random() * 18) + 's';
  n.style.animationDelay = (-Math.random() * 20) + 's';
  nb.appendChild(n);
}

// ── UI Helpers ────────────────────────────────────────────
function showError(msg) {
  document.getElementById('errorText').textContent = msg;
  document.getElementById('errorMsg').classList.add('show');
  document.getElementById('successMsg').classList.remove('show');
}
function showSuccess(msg) {
  document.getElementById('successText').textContent = msg;
  document.getElementById('successMsg').classList.add('show');
  document.getElementById('errorMsg').classList.remove('show');
}
function clearMessages() {
  document.getElementById('errorMsg').classList.remove('show');
  document.getElementById('successMsg').classList.remove('show');
}
function setLoading(btn, loading) {
  btn.disabled = loading;
  btn.classList.toggle('loading', loading);
}

function togglePw() {
  const input = document.getElementById('password');
  const icon = document.getElementById('eyeIcon');
  if (input.type === 'password') {
    input.type = 'text';
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    input.type = 'password';
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}

// ── Firebase Error Handler ────────────────────────────────
function handleAuthError(code) {
  const errors = {
    'auth/user-not-found': 'No account found with this email.',
    'auth/wrong-password': 'Wrong password. Please try again.',
    'auth/invalid-email': 'Invalid email format.',
    'auth/too-many-requests': 'Too many attempts. Please try again later.',
    'auth/network-request-failed': 'Connection failed. Check your internet connection.',
    'auth/invalid-credential': 'Incorrect email or password.',
    'auth/popup-closed-by-user': 'Sign in cancelled.',
    'auth/cancelled-popup-request': null,
  };
  return errors[code] || 'An error occurred. Please try again.';
}

// ── Login with Email ──────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('btnLogin');

  clearMessages();
  if (!email) { showError('Please enter your email address.'); return; }
  if (!password) { showError('Please enter your password.'); return; }

  setLoading(btn, true);
  try {
    const fn = window._fbFunctions;
    const auth = window._firebaseAuth;
    await fn.signInWithEmailAndPassword(auth, email, password);
    showSuccess('Signed in! Redirecting...');
    setTimeout(() => { window.location.href = 'follow-artists.html'; }, 800);
  } catch (err) {
    const msg = handleAuthError(err.code);
    if (msg) showError(msg);
  } finally {
    setLoading(btn, false);
  }
}

// ── Login with Google ─────────────────────────────────────
async function doGoogleLogin() {
  clearMessages();
  try {
    const fn = window._fbFunctions;
    const auth = window._firebaseAuth;
    const provider = window._googleProvider;
    await fn.signInWithPopup(auth, provider);
    showSuccess('Signed in! Redirecting...');
    setTimeout(() => { window.location.href = 'follow-artists.html'; }, 800);
  } catch (err) {
    const msg = handleAuthError(err.code);
    if (msg) showError(msg);
  }
}

// ── Reset Password ────────────────────────────────────────
function openReset() { document.getElementById('resetModal').classList.add('open'); }
function closeReset() {
  document.getElementById('resetModal').classList.remove('open');
  document.getElementById('resetError').classList.remove('show');
  document.getElementById('resetSuccess').classList.remove('show');
  document.getElementById('resetEmail').value = '';
}

async function doReset() {
  const email = document.getElementById('resetEmail').value.trim();
  const btn = document.getElementById('btnReset');
  document.getElementById('resetError').classList.remove('show');
  document.getElementById('resetSuccess').classList.remove('show');

  if (!email) {
    document.getElementById('resetErrorText').textContent = 'Please enter your email address.';
    document.getElementById('resetError').classList.add('show');
    return;
  }
  setLoading(btn, true);
  try {
    const fn = window._fbFunctions;
    const auth = window._firebaseAuth;
    await fn.sendPasswordResetEmail(auth, email);
    document.getElementById('resetSuccess').classList.add('show');
  } catch (err) {
    const msg = handleAuthError(err.code) || 'Failed to send reset email.';
    document.getElementById('resetErrorText').textContent = msg;
    document.getElementById('resetError').classList.add('show');
  } finally {
    setLoading(btn, false);
  }
}

// ── Enter key ─────────────────────────────────────────────
document.getElementById('email').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('password').focus(); });
document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('resetEmail').addEventListener('keydown', e => { if (e.key === 'Enter') doReset(); });
document.getElementById('resetModal').addEventListener('click', e => { if (e.target === document.getElementById('resetModal')) closeReset(); });

// ── Make functions global ─────────────────────────────────
window.doLogin = doLogin;
window.doGoogleLogin = doGoogleLogin;
window.doReset = doReset;
window.openReset = openReset;
window.closeReset = closeReset;
window.togglePw = togglePw;

// Register Service Worker (PWA)
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(console.error);
}
</script>
